name: Build & Deploy Web Demo

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # allows manual trigger from GitHub Actions tab

# Allow deploying to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.6"
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate local_secrets.dart
        run: |
          echo "const String kLocalGroqApiKey = '${GROQ_API_KEY}';" > lib/utils/local_secrets.dart
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Build web (release)
        run: |
          flutter build web \
            --release \
            --web-renderer canvaskit \
            --dart-define=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            --base-href "/Todo-List-MobileApp/"
        # Note: base-href must match your repo name exactly.
        # If your repo is at github.com/user/Todo-List-MobileApp
        # then base-href = /Todo-List-MobileApp/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
