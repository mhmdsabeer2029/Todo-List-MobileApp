name: Build & Deploy Web Demo

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate local_secrets.dart
        run: |
          echo "const String kLocalGroqApiKey = '${GROQ_API_KEY}';" > lib/utils/local_secrets.dart
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Build web (release)
        run: |
          flutter build web \
            --release \
            --web-renderer html \
            --dart-define=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            --base-href "/${{ github.event.repository.name }}/" \
            --pwa-strategy=none
        # --web-renderer html: no 8MB CanvasKit WASM, loads almost instantly
        # --pwa-strategy=none: skip service worker, no delay on first visit

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
