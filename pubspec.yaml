name: todolist
description: A production-ready mobile task manager inspired by Todoist.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # Database — sqflite for mobile, shared_preferences JSON for web
  sqflite: ^2.3.2
  path: ^1.8.3

  # UI
  flutter_slidable: ^3.1.0

  # Notifications (mobile only — web uses a stub)
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

  # Utils
  uuid: ^4.3.3
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  haptic_feedback: ^0.5.1+1
  collection: ^1.18.0
  speech_to_text: ^6.6.0
  permission_handler: ^11.1.0
  http: ^1.2.2
  google_sign_in: ^6.2.1
  url_launcher: ^6.3.1

  # Charts
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
